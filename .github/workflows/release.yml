name: release-ruby-sdk

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run control-plane unit tests
        run: python3 -m unittest discover -s scripts/tests -v

      - name: Verify checked-in generation
        run: python3 scripts/sdkctl.py sync --skip-fetch --check

      - name: Verify release tag
        run: python3 scripts/sdkctl.py verify-release --tag "${GITHUB_REF_NAME}"

      - name: Run Ruby tests
        run: bundle exec rake test

      - name: Build gem
        run: gem build justserpapi.gemspec

      - name: Smoke install built gem
        run: |
          gem install justserpapi-*.gem
          ruby -e 'require "justserpapi"; client = JustSerpApi::Client.new(api_key: "test-key"); abort("missing google resource") unless client.google.class.name == "JustSerpApi::GoogleResource"'

      - name: Publish to RubyGems.org
        uses: rubygems/release-gem@v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

